openapi: 3.1.0
info:
  title: Repair Operations Platform API
  version: 0.1.0
  description: Contract for the MVP repair workflow, RBAC, evidence, quotations, payments, notifications, and reports.
servers:
  - url: https://app.example.local/api
security:
  - sessionAuth: []
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
  schemas:
    JobStatus:
      type: string
      enum:
        - NEW JOB
        - WAITING FADHIL REVIEW
        - WAITING CUSTOMER CONFIRMATION
        - IN PROGRESS
        - READY PICKUP
        - COMPLETE
        - CANCELLED
        - CLOSED_NO_REPAIR
    Role:
      type: string
      enum: [owner_manager, technician, store_staff]
    Job:
      type: object
      required: [id, jobNumber, status, customerId, deviceId]
      properties:
        id: { type: string }
        jobNumber: { type: string }
        status: { $ref: '#/components/schemas/JobStatus' }
        customerId: { type: string }
        deviceId: { type: string }
        issueDescription: { type: string }
        assignedTechnicianId: { type: string, nullable: true }
        nasFolderPath: { type: string }
    CreateJobRequest:
      type: object
      required: [customer, device, issueDescription]
      properties:
        customer:
          type: object
          required: [name, phone]
          properties:
            name: { type: string }
            phone: { type: string }
            email: { type: string, nullable: true }
            preferredChannel: { type: string, enum: [whatsapp, email, phone, none] }
            whatsappConsent: { type: boolean }
            emailConsent: { type: boolean }
        device:
          type: object
          required: [type, brand]
          properties:
            type: { type: string }
            brand: { type: string }
            model: { type: string, nullable: true }
            serialNumber: { type: string, nullable: true }
            accessoriesReceived: { type: string, nullable: true }
            conditionNotes: { type: string, nullable: true }
        issueDescription: { type: string }
        intakeNotes: { type: string, nullable: true }
        serviceNoteExtract:
          $ref: '#/components/schemas/ServiceNoteScanResult'
    ServiceNoteScanResult:
      type: object
      properties:
        serviceNumber: { type: string, nullable: true }
        receivedDate: { type: string, nullable: true }
        customer:
          type: object
          properties:
            name: { type: string, nullable: true }
            phone: { type: string, nullable: true }
            email: { type: string, nullable: true }
        device:
          type: object
          properties:
            type: { type: string, nullable: true }
            brand: { type: string, nullable: true }
            model: { type: string, nullable: true }
            serialNumber: { type: string, nullable: true }
            specifications: { type: string, nullable: true }
            password: { type: string, nullable: true }
        repair:
          type: object
          properties:
            reportedIssue: { type: string, nullable: true }
            initialDiagnosis: { type: string, nullable: true }
            repairActionTaken: { type: string, nullable: true }
            partsReplaced: { type: string, nullable: true }
        charges:
          type: object
          properties:
            serviceFee: { type: string, nullable: true }
            partsFee: { type: string, nullable: true }
            total: { type: string, nullable: true }
        warranty:
          type: object
          properties:
            days: { type: string, nullable: true }
        confidenceByField:
          type: object
          additionalProperties: { type: number }
        rawTextNotes: { type: string, nullable: true }
    DiagnosisRequest:
      type: object
      required: [summary]
      properties:
        summary: { type: string }
        details: { type: string, nullable: true }
        recommendedAction: { type: string, nullable: true }
        submitForReview: { type: boolean }
    QuotationRequest:
      type: object
      required: [lineItems, total]
      properties:
        lineItems:
          type: array
          items:
            type: object
            required: [description, amount]
            properties:
              description: { type: string }
              amount: { type: number }
        discount: { type: number, default: 0 }
        total: { type: number }
        expiresAt: { type: string, format: date-time }
    CustomerDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected, no_repair]
        customerName: { type: string }
        notes: { type: string, nullable: true }
    PaymentRequest:
      type: object
      required: [amount, method, paidAt]
      properties:
        amount: { type: number }
        method: { type: string, enum: [cash, card, bank_transfer, ewallet, other] }
        reference: { type: string, nullable: true }
        paidAt: { type: string, format: date-time }
        notes: { type: string, nullable: true }
    CompleteJobRequest:
      type: object
      properties:
        closureReason: { type: string, nullable: true }
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
paths:
  /service-notes/scan:
    post:
      summary: Extract service-note fields from an uploaded PDF or image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Extracted service-note draft
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceNoteScanResult' }
        '400':
          description: Missing or unsupported file
        '502':
          description: Extraction provider unavailable or invalid output
  /jobs:
    get:
      summary: List jobs by status, branch, customer, or assigned technician
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/JobStatus' }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: Job list
    post:
      summary: Create a new repair job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateJobRequest' }
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '403':
          description: Role not allowed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /jobs/{jobId}:
    get:
      summary: Get job detail with timeline and permitted evidence metadata
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job detail }
  /jobs/{jobId}/diagnoses:
    post:
      summary: Add diagnosis or submit diagnosis for owner review
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiagnosisRequest' }
      responses:
        '201': { description: Diagnosis recorded }
        '403': { description: Role not allowed }
  /jobs/{jobId}/quotations:
    post:
      summary: Create or revise quotation, Owner/Manager only
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationRequest' }
      responses:
        '201': { description: Quotation created }
        '403': { description: Role not allowed }
  /jobs/{jobId}/quotations/{quotationId}/send:
    post:
      summary: Send quotation to customer and create approval link
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
        - in: path
          name: quotationId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Quotation sent or queued }
  /approval-links/{token}:
    get:
      summary: Read customer approval link quote context
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200': { description: Approval link detail }
        '410': { description: Link expired or already used }
  /approval-links/{token}/decision:
    post:
      summary: Record customer approval, rejection, or no-repair decision
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerDecisionRequest' }
      responses:
        '200': { description: Decision recorded }
        '410': { description: Link expired or already used }
  /jobs/{jobId}/attachments:
    post:
      summary: Upload job evidence with server-side validation
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [category, file]
              properties:
                category:
                  type: string
                  enum: [service_note, diagnosis_photo, screenshot, quote, approval, payment_proof, other]
                file:
                  type: string
                  format: binary
      responses:
        '201': { description: Attachment accepted }
        '415': { description: File category or type rejected }
  /jobs/{jobId}/payments:
    post:
      summary: Record payment for a job
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentRequest' }
      responses:
        '201': { description: Payment recorded }
  /jobs/{jobId}/ready-pickup:
    post:
      summary: Mark approved repair job ready for pickup
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job marked ready for pickup }
        '403': { description: Role not allowed }
  /jobs/{jobId}/complete:
    post:
      summary: Complete a job after payment or authorized closure reason
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompleteJobRequest' }
      responses:
        '200': { description: Job completed }
        '409': { description: Completion precondition missing }
  /dashboard/owner:
    get:
      summary: Owner dashboard metrics and action queues
      responses:
        '200': { description: Dashboard summary }
  /reports/jobs:
    get:
      summary: Job and payment report by date range
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200': { description: Report data }
  /customers:
    get:
      summary: List customers for operational management
      responses:
        '200': { description: Customer list }
    post:
      summary: Create customer record
      responses:
        '201': { description: Customer created }
  /customers/{customerId}:
    get:
      summary: Get customer record
      responses:
        '200': { description: Customer detail }
    patch:
      summary: Update customer record
      responses:
        '200': { description: Customer updated }
    delete:
      summary: Archive customer record
      responses:
        '200': { description: Customer archived }
  /customers/{customerId}/devices:
    get:
      summary: List customer devices
      responses:
        '200': { description: Device list }
    post:
      summary: Create customer device
      responses:
        '201': { description: Device created }
  /devices:
    get:
      summary: List devices
      responses:
        '200': { description: Device list }
  /devices/{deviceId}:
    patch:
      summary: Update device record
      responses:
        '200': { description: Device updated }
    delete:
      summary: Archive device record
      responses:
        '200': { description: Device archived }
  /technicians:
    get:
      summary: List technicians and workload
      responses:
        '200': { description: Technician list }
    post:
      summary: Create technician
      responses:
        '201': { description: Technician created }
  /technicians/{technicianId}:
    patch:
      summary: Update technician
      responses:
        '200': { description: Technician updated }
    delete:
      summary: Deactivate technician
      responses:
        '200': { description: Technician deactivated }
  /quotations:
    get:
      summary: List quotations
      responses:
        '200': { description: Quotation list }
  /quotations/{quotationId}:
    get:
      summary: Get quotation detail
      responses:
        '200': { description: Quotation detail }
    patch:
      summary: Revise quotation
      responses:
        '200': { description: Quotation revision created }
    delete:
      summary: Void quotation
      responses:
        '200': { description: Quotation voided }
  /payments:
    get:
      summary: List payments
      responses:
        '200': { description: Payment list }
  /payments/{paymentId}:
    get:
      summary: Get payment detail
      responses:
        '200': { description: Payment detail }
    patch:
      summary: Update payment metadata
      responses:
        '200': { description: Payment updated }
    delete:
      summary: Void payment
      responses:
        '200': { description: Payment voided }
  /settings/system:
    get:
      summary: Read system settings
      responses:
        '200': { description: System settings }
    patch:
      summary: Update non-secret system settings
      responses:
        '200': { description: System settings updated }
